<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | ラクトケア</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --teal-50: #E1F5EE; --teal-100: #9FE1CB; --teal-500: #1D9E75;
      --teal-700: #0F6E56; --gray-50: #F9F9F8; --gray-100: #F1EFE8;
      --gray-300: #D3D1C7; --gray-500: #888780; --gray-800: #444441; --gray-900: #2C2C2A;
      --radius-md: 8px; --radius-lg: 12px;
    }
    body { font-family: 'Noto Sans JP', sans-serif; background: #fff; color: var(--gray-900); line-height: 1.7; }
    a { color: inherit; text-decoration: none; }
    header { background: #fff; border-bottom: 0.5px solid var(--gray-300); }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; max-width: 960px; margin: 0 auto; }
    .logo { font-size: 18px; font-weight: 700; color: var(--teal-700); }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { font-size: 14px; color: var(--gray-800); }
    .nav-links a:hover { color: var(--teal-500); }
    .page-hero { background: var(--teal-50); padding: 3rem 1.5rem; text-align: center; }
    .page-hero h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .page-hero p { font-size: 15px; color: var(--gray-800); }
    .container { max-width: 680px; margin: 0 auto; padding: 4rem 1.5rem; }
    h2 { font-size: 20px; font-weight: 700; margin-bottom: 1.5rem; padding-bottom: 10px; border-bottom: 2px solid var(--teal-500); display: inline-block; }
    .info-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 3rem; }
    .info-card { background: var(--gray-50); border: 0.5px solid var(--gray-300); border-radius: var(--radius-lg); padding: 1.25rem; text-align: center; }
    .info-icon { font-size: 28px; margin-bottom: 8px; }
    .info-label { font-size: 12px; color: var(--gray-500); margin-bottom: 4px; }
    .info-value { font-size: 14px; font-weight: 500; }
    form { display: flex; flex-direction: column; gap: 20px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 14px; font-weight: 500; }
    label span { color: #E24B4A; font-size: 12px; margin-left: 4px; }
    input, select, textarea {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      border: 0.5px solid var(--gray-300);
      border-radius: var(--radius-md);
      background: #fff;
      color: var(--gray-900);
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--teal-500); }
    textarea { resize: vertical; min-height: 140px; }
    .submit-btn {
      background: var(--teal-500); color: #fff; border: none;
      padding: 14px; border-radius: var(--radius-md); font-size: 15px;
      font-weight: 500; cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
      transition: background 0.15s;
    }
    .submit-btn:hover { background: var(--teal-700); }
    .note { font-size: 13px; color: var(--gray-500); background: var(--gray-50); border-radius: var(--radius-md); padding: 12px 16px; border: 0.5px solid var(--gray-300); }
    footer { background: var(--gray-900); color: #fff; padding: 2rem 1.5rem; margin-top: 4rem; }
    .footer-inner { max-width: 960px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .footer-logo { font-size: 16px; font-weight: 700; color: var(--teal-100); }
    .footer-links { display: flex; gap: 20px; }
    .footer-links a { font-size: 13px; color: var(--gray-300); }
    .copyright { font-size: 12px; color: var(--gray-500); margin-top: 4px; }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="logo">🌿 ラクトケア</a>
      <div class="nav-links">
        <a href="index.html">トップ</a>
        <a href="about.html">会社概要</a>
        <a href="contact.html">お問い合わせ</a>
        <a href="ingredients.html">成分・効果</a>
        <a href="subscription.html">定期購入</a>
      </div>
    </nav>
  </header>

  <div class="page-hero">
    <h1>お問い合わせ</h1>
    <p>ご不明な点はお気軽にご連絡ください。</p>
  </div>

  <div class="container">
    <div class="info-cards">
      <div class="info-card">
        <div class="info-icon">📞</div>
        <div class="info-label">電話受付</div>
        <div class="info-value">06-1234-5678</div>
        <div class="info-label" style="margin-top:4px">平日 9:00〜18:00</div>
      </div>
      <div class="info-card">
        <div class="info-icon">📧</div>
        <div class="info-label">メール</div>
        <div class="info-value">info@lactocare.jp</div>
        <div class="info-label" style="margin-top:4px">24時間受付</div>
      </div>
      <div class="info-card">
        <div class="info-icon">💬</div>
        <div class="info-label">返信目安</div>
        <div class="info-value">2営業日以内</div>
        <div class="info-label" style="margin-top:4px">土日祝除く</div>
      </div>
    </div>

    <h2>お問い合わせフォーム</h2>

    <form onsubmit="handleSubmit(event)">
      <div class="field">
        <label>お名前<span>必須</span></label>
        <input type="text" placeholder="田中 花子" required>
      </div>
      <div class="field">
        <label>メールアドレス<span>必須</span></label>
        <input type="email" placeholder="example@email.com" required>
      </div>
      <div class="field">
        <label>電話番号</label>
        <input type="tel" placeholder="090-0000-0000">
      </div>
      <div class="field">
        <label>お問い合わせ種別<span>必須</span></label>
        <select required>
          <option value="">選択してください</option>
          <option>商品について</option>
          <option>定期購入・解約について</option>
          <option>配送・返品について</option>
          <option>その他</option>
        </select>
      </div>
      <div class="field">
        <label>お問い合わせ内容<span>必須</span></label>
        <textarea placeholder="お問い合わせ内容をご記入ください。" required></textarea>
      </div>
      <div class="note">※ ご入力いただいた個人情報は、お問い合わせへの回答のみに使用します。</div>
      <button type="submit" class="submit-btn">送信する</button>
    </form>
  </div>

  <footer>
    <div class="footer-inner">
      <div>
        <div class="footer-logo">🌿 ラクトケア</div>
        <div class="copyright">© 2026 ラクトケア株式会社</div>
      </div>
      <div class="footer-links">
        <a href="#">特定商取引法</a>
        <a href="#">プライバシーポリシー</a>
        <a href="contact.html">お問い合わせ</a>
      </div>
    </div>
  </footer>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      alert('お問い合わせを受け付けました。2営業日以内にご連絡いたします。');
    }
  </script>
</body>
</html>
